; TurboQuant Vulkan server — RX 580 8GB
; Edit the model path below to point to a GGUF file on this machine.
; turbo3 KV cache cuts VRAM by ~3x vs f16, enabling larger ctx on 8GB.

[*]
jinja = true
flash-attn = auto
ngl = 99
parallel = 1
ctx-size = 8192
cache-type-k = turbo3
cache-type-v = turbo3

; ---- PUT YOUR MODEL HERE ----
[my-model]
model = C:\path\to\your-model.gguf
alias = my-model
